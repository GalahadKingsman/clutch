# Подключение Let's Encrypt к nginx в Docker.
# 1) Выпусти сертификат на хосте (см. docs/CERTBOT_VPS.md)
# 2) Создай deploy/nginx/nginx-ssl.conf из nginx-ssl.example.conf (свой домен)
# 3) docker compose -f docker-compose.yml -f docker-compose.ssl.yml up -d --build nginx

services:
  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./deploy/nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
