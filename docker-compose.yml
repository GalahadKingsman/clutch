services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clutch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-clutch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clutch}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    entrypoint: ["/app/clutch-migrate"]
    command: ["up"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    entrypoint: ["/app/clutch-api"]
    restart: unless-stopped
    env_file: .env
    volumes:
      - uploads_data:/app/data/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"

  bot:
    build:
      context: .
      dockerfile: deploy/Dockerfile.bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    expose:
      - "8081"

  nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
